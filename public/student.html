<!doctype html>
<html lang="lv">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Skolēns — Pārbaudes darbi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand bg-light mb-3">
        <div class="container-fluid">
            <div id="navLinks" class="navbar-nav me-auto"></div>
            <span class="navbar-brand">Skolēns</span>
            <div id="userInfo" class="ms-auto"></div>
            <button id="changePassBtn" class="btn btn-outline-secondary btn-sm ms-2">Mainīt paroli</button>
            <button id="logoutBtn" class="btn btn-outline-secondary btn-sm ms-2">Iziet</button>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>Pārbaudes darbi</h3>
            <div>
                <button id="exportPdfBtn" class="btn btn-outline-primary btn-sm">Eksportēt PDF</button>
            </div>
        </div>

        <div class="row g-2 mb-3">
            <div class="col-md-4">
                <label class="form-label">Klase</label>
                <select id="filter_class" class="form-select"></select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Priekšmets</label>
                <select id="filter_subject" class="form-select">
                    <option value="all">Visi</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Mēnesis</label>
                <select id="filter_month" class="form-select">
                    <option value="all">Visi</option>
                </select>
            </div>
        </div>

        <div class="accordion" id="studentAssessAccordion">
            <div class="accordion-item">
                <h2 class="accordion-header" id="hUpcoming">
                    <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#cUpcoming"
                        aria-expanded="true">Gaidāmie</button>
                </h2>
                <div id="cUpcoming" class="accordion-collapse collapse show" data-bs-parent="#studentAssessAccordion">
                    <div class="accordion-body p-0">
                        <table class="table table-striped mb-0">
                            <thead>
                                <tr>
                                    <th>Priekšmets</th>
                                    <th>Nosaukums</th>
                                    <th>Datums</th>
                                    <th>Svars</th>
                                    <th>Darbība</th>
                                </tr>
                            </thead>
                            <tbody id="upcomingTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="accordion-item">
                <h2 class="accordion-header" id="hPast">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#cPast"
                        aria-expanded="false">Iepriekšējie</button>
                </h2>
                <div id="cPast" class="accordion-collapse collapse" data-bs-parent="#studentAssessAccordion">
                    <div class="accordion-body p-0">
                        <table class="table table-striped mb-0">
                            <thead>
                                <tr>
                                    <th>Priekšmets</th>
                                    <th>Nosaukums</th>
                                    <th>Datums</th>
                                    <th>Svars</th>
                                    <th>Darbība</th>
                                </tr>
                            </thead>
                            <tbody id="pastTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="accordion-item">
                <h2 class="accordion-header" id="hNoDate">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#cNoDate"
                        aria-expanded="false">Bez datuma</button>
                </h2>
                <div id="cNoDate" class="accordion-collapse collapse" data-bs-parent="#studentAssessAccordion">
                    <div class="accordion-body p-0">
                        <table class="table table-striped mb-0">
                            <thead>
                                <tr>
                                    <th>Priekšmets</th>
                                    <th>Nosaukums</th>
                                    <th>Datums/Periods</th>
                                    <th>Svars</th>
                                    <th>Darbība</th>
                                </tr>
                            </thead>
                            <tbody id="nodateTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="viewModalStudent" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Pārbaudes darbs</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p><strong>Klase:</strong> <span id="sv_class"></span></p>
                    <p><strong>Priekšmets:</strong> <span id="sv_subject"></span></p>
                    <p><strong>Tips:</strong> <span id="sv_type"></span></p>
                    <p><strong>Nosaukums:</strong> <span id="sv_title"></span></p>
                    <p><strong>Apraksts:</strong> <div id="sv_desc"></div></p>
                    <p><strong>Datums/Periods:</strong> <span id="sv_date"></span></p>
                    <p><strong>Svars:</strong> <span id="sv_weight"></span></p>
                    <p><strong>Pievienoja:</strong> <span id="sv_creator"></span></p>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Aizvērt</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="changePassModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header"><h5 class="modal-title">Mainīt paroli</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
          <div class="modal-body">
            <div class="mb-2">
              <label class="form-label">Pašreizējā parole</label>
              <input id="cp_old" type="password" class="form-control" placeholder="Ja ir pagaidu parole, ievadiet to">
            </div>
            <div class="mb-2">
              <label class="form-label">Jaunā parole</label>
              <input id="cp_new" type="password" class="form-control" required>
            </div>
            <div class="mb-2">
              <label class="form-label">Apstiprināt jauno paroli</label>
              <input id="cp_new2" type="password" class="form-control" required>
            </div>
          </div>
          <div class="modal-footer">
            <button id="changePassSave" class="btn btn-primary">Saglabāt</button>
            <button class="btn btn-secondary" data-bs-dismiss="modal">Aizvērt</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/student.js"></script>
</body>

</html>
